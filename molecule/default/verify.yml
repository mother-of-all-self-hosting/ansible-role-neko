---
- name: Verify Neko systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Neko service to become active (up to 180s)
      ansible.builtin.systemd:
        name: neko.service
      register: neko_service
      until: neko_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Neko service is active
      ansible.builtin.assert:
        that: neko_service.status.ActiveState == 'active'
        fail_msg: "neko.service not active ({{ neko_service.status.ActiveState }})"
        success_msg: "neko.service is active"

    - name: Wait for Neko HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8080/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: neko_endpoint
      until: neko_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Neko HTTP endpoint responds
      ansible.builtin.assert:
        that: neko_endpoint.status in [200, 302]
        fail_msg: "Neko did not respond as expected ({{ neko_endpoint.status | default('no response') }})"
        success_msg: "Neko responded with {{ neko_endpoint.status }}"

    - name: Show Neko systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Neko systemd: {{ neko_service.status.ActiveState }}"
          - "Neko HTTP: {{ neko_endpoint.status }}"
